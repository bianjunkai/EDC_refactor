<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统配置 - EDC</title>
    <link rel="stylesheet" href="https://unpkg.com/antd@4.24.0/dist/antd.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        
        /* 顶部导航 */
        .header { background: #fff; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e8e8; }
        .logo { font-size: 18px; font-weight: 600; color: #1890ff; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .user-info { display: flex; align-items: center; gap: 8px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #1890ff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        /* 主体 */
        .main { display: flex; height: calc(100vh - 64px); }
        
        /* 侧边栏 */
        .sidebar { width: 200px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px 0; }
        .sidebar-title { padding: 8px 20px; font-size: 13px; color: #999; font-weight: 500; }
        .sidebar-item { padding: 12px 20px; font-size: 14px; color: #333; cursor: pointer; }
        .sidebar-item:hover { background: #f5f5f5; }
        .sidebar-item.active { background: #e6f7ff; color: #1890ff; border-right: 3px solid #1890ff; }
        
        /* 内容区 */
        .content { flex: 1; padding: 24px; overflow-y: auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 20px; font-weight: 600; color: #333; }
        
        /* 表格 */
        .table-container { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .table { width: 100%; border-collapse: collapse; }
        .table th { background: #fafafa; padding: 14px 16px; text-align: left; font-weight: 600; font-size: 14px; color: #333; border-bottom: 1px solid #e8e8e8; }
        .table td { padding: 14px 16px; font-size: 14px; color: #333; border-bottom: 1px solid #f0f0f0; }
        
        .action-btn { color: #1890ff; cursor: pointer; font-size: 13px; margin-right: 12px; }
        .action-btn.danger { color: #ff4d4f; }
        
        /* 按钮 */
        .btn { padding: 8px 16px; border-radius: 4px; font-size: 14px; cursor: pointer; border: none; transition: all 0.3s; }
        .btn-primary { background: #1890ff; color: #fff; }
        .btn-primary:hover { background: #40a9ff; }
        
        /* 标签 */
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tag-enabled { background: #f6ffed; color: #52c41a; }
        .tag-disabled { background: #f5f5f5; color: #999; }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="logo">🏥 EDC系统</div>
        <div class="header-right">
            <div class="user-info">
                <div class="avatar">管</div>
                <span>管理员</span>
            </div>
        </div>
    </header>
    
    <!-- 主体 -->
    <div class="main">
        <!-- 侧边栏 -->
        <aside class="sidebar">
            <div class="sidebar-title">系统配置</div>
            <div class="sidebar-item active">👤 用户管理</div>
            <div class="sidebar-item">🔖 角色管理</div>
            <div class="sidebar-item">🏥 中心管理</div>
            <div class="sidebar-item">📚 数据字典</div>
            <div class="sidebar-item">📋 审核流程</div>
        </aside>
        
        <!-- 内容区 -->
        <main class="content">
            <div class="page-header">
                <div class="page-title">👤 用户管理</div>
                <button class="btn btn-primary">➕ 新增用户</button>
            </div>
            
            <div class="table-container">
                <table class="table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>用户名</th>
                            <th>科室</th>
                            <th>所属中心</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>张三</td>
                            <td>zhangsan</td>
                            <td>内科</td>
                            <td>中心1</td>
                            <td>数据录入员</td>
                            <td><span class="tag tag-enabled">启用</span></td>
                            <td>
                                <span class="action-btn">编辑</span>
                                <span class="action-btn">禁用</span>
                            </td>
                        </tr>
                        <tr>
                            <td>李四</td>
                            <td>lisi</td>
                            <td>外科</td>
                            <td>中心1</td>
                            <td>审核员</td>
                            <td><span class="tag tag-enabled">启用</span></td>
                            <td>
                                <span class="action-btn">编辑</span>
                                <span class="action-btn">禁用</span>
                            </td>
                        </tr>
                        <tr>
                            <td>王五</td>
                            <td>wangwu</td>
                            <td>肿瘤科</td>
                            <td>中心2</td>
                            <td>项目管理员</td>
                            <td><span class="tag tag-enabled">启用</span></td>
                            <td>
                                <span class="action-btn">编辑</span>
                                <span class="action-btn">禁用</span>
                            </td>
                        </tr>
                        <tr>
                            <td>赵六</td>
                            <td>zhaoliu</td>
                            <td>内科</td>
                            <td>中心3</td>
                            <td>数据录入员</td>
                            <td><span class="tag tag-disabled">禁用</span></td>
                            <td>
                                <span class="action-btn">编辑</span>
                                <span class="action-btn">启用</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
