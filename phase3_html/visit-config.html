<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>访视配置 - EDC</title>
    <link rel="stylesheet" href="https://unpkg.com/antd@4.24.0/dist/antd.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f7fa; }
        
        /* 顶部 */
        .header { background: #fff; padding: 0 24px; height: 64px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e8e8e8; }
        .header-left { display: flex; align-items: center; gap: 24px; }
        .logo { font-size: 18px; font-weight: 600; color: #1890ff; }
        .breadcrumb { font-size: 14px; color: #666; }
        .header-right { display: flex; align-items: center; gap: 16px; }
        .avatar { width: 32px; height: 32px; border-radius: 50%; background: #1890ff; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        
        /* 主体 */
        .main { padding: 24px; max-width: 1400px; margin: 0 auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-title { font-size: 20px; font-weight: 600; color: #333; }
        
        /* 视图切换 */
        .view-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .view-tab { padding: 8px 16px; border-radius: 4px; font-size: 14px; cursor: pointer; background: #fff; border: 1px solid #d9d9d9; }
        .view-tab.active { background: #1890ff; color: #fff; border-color: #1890ff; }
        
        /* 阶段卡片 */
        .stage-card { background: #fff; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); overflow: hidden; }
        .stage-header { background: #fafafa; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f0f0f0; }
        .stage-title { font-size: 16px; font-weight: 600; color: #333; }
        
        /* 表格 */
        .table { width: 100%; border-collapse: collapse; }
        .table th { background: #fff; padding: 12px 16px; text-align: left; font-weight: 500; font-size: 14px; color: #666; border-bottom: 1px solid #f0f0f0; }
        .table td { padding: 14px 16px; font-size: 14px; color: #333; border-bottom: 1px solid #f5f5f5; }
        .table tr:last-child td { border-bottom: none; }
        
        .action-btn { color: #1890ff; cursor: pointer; font-size: 13px; margin-right: 12px; }
        .add-btn { padding: 8px 16px; font-size: 13px; color: #1890ff; cursor: pointer; border: 1px dashed #1890ff; border-radius: 4px; display: inline-block; }
        
        /* 按钮 */
        .btn { padding: 8px 16px; border-radius: 4px; font-size: 14px; cursor: pointer; border: none; transition: all 0.3s; }
        .btn-primary { background: #1890ff; color: #fff; }
        
        /* 矩阵图 */
        .matrix-container { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); overflow-x: auto; }
        .matrix { border-collapse: collapse; }
        .matrix th, .matrix td { border: 1px solid #e8e8e8; padding: 10px 16px; text-align: center; font-size: 13px; }
        .matrix th { background: #fafafa; font-weight: 600; }
        .matrix th.row-header { background: #e6f7ff; text-align: left; min-width: 150px; }
        .matrix td { width: 80px; }
        .matrix .cell-check { color: #52c41a; font-size: 18px; }
        .matrix .cell-empty { color: #d9d9d9; }
        
        .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
        .tag-loop { background: #e6f7ff; color: #1890ff; }
        .tag-single { background: #f5f5f5; color: #666; }
        .tag-type { background: #f6ffed; color: #52c41a; }
        .tag-type-unplanned { background: #fff7e6; color: #fa8c16; }
    </style>
</head>
<body>
    <!-- 顶部 -->
    <header class="header">
        <div class="header-left">
            <div class="logo">🏥 EDC系统</div>
            <div class="breadcrumb">项目管理 > 肿瘤药物临床试验A > 访视配置</div>
        </div>
        <div class="header-right">
            <div class="avatar">管</div>
        </div>
    </header>
    
    <!-- 主体 -->
    <main class="main">
        <div class="page-header">
            <div class="page-title">📅 访视配置 - 肿瘤药物临床试验A</div>
            <button class="btn btn-primary">➕ 新增阶段</button>
        </div>
        
        <!-- 视图切换 -->
        <div class="view-tabs">
            <div class="view-tab active">📋 列表视图</div>
            <div class="view-tab">🔢 矩阵图</div>
        </div>
        
        <!-- 矩阵图总览 -->
        <div class="matrix-container">
            <div style="margin-bottom: 16px; font-size: 15px; font-weight: 600;">📊 访视-CRF 矩阵总览</div>
            <table class="matrix">
                <thead>
                    <tr>
                        <th class="row-header">CRF / 访视</th>
                        <th>筛选期<br>访视1</th>
                        <th>筛选期<br>访视2</th>
                        <th>治疗期<br>访视1(循环)</th>
                        <th>治疗期<br>访视2(循环)</th>
                        <th>治疗期<br>访视3(计划外)</th>
                        <th>随访期<br>访视1(循环)</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <th class="row-header">人口学资料</th>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                    </tr>
                    <tr>
                        <th class="row-header">既往病史</th>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                    </tr>
                    <tr>
                        <th class="row-header">体格检查</th>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                    </tr>
                    <tr>
                        <th class="row-header">实验室检查</th>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                    </tr>
                    <tr>
                        <th class="row-header">心电图</th>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                    </tr>
                    <tr>
                        <th class="row-header">不良事件</th>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                    </tr>
                    <tr>
                        <th class="row-header">合并用药</th>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-empty">-</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                        <td><span class="matrix .cell-check">✓</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
